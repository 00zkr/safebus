services:
  mysql:
    image: mysql:8.0
    container_name: school_transport_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: school_transport
      MYSQL_USER: transport_user
      MYSQL_PASSWORD: transport_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: school_transport_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: transport_user
      DB_PASSWORD: transport_pass
      DB_NAME: school_transport
      JWT_SECRET: change_this_secret_for_demo
      JWT_EXPIRES_IN: 1d
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src

  web:
    build: ./web
    container_name: school_transport_web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    volumes:
      - ./web/src:/app/src

volumes:
  mysql_data:
